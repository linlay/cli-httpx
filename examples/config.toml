version = 1
description = "Example API for local experiments"
base_url = "https://api.example.com"
timeout = "10s"
retries = 1

[headers]
Accept = "application/json"
User-Agent = "httpx/1.0"

[login]
path = "/session"
body_format = "form"
save = { "auth.authorization" = "\"Bearer \" + .body.token" }

[actions.me]
description = "Fetch the current user profile"
path = "/me"
headers = { Authorization = { from = "state", key = "auth.authorization" } }
extract_type = "jq"
extract_expr = ".body | {id, name, email}"

[actions.search]
description = "Search public resources"
path = "/search"
query = { q = { from = "param", key = "q" }, limit = { from = "param", key = "limit", default = 10 }, api_key = { from = "file", path = "~/.local/secret/httpx/demo-api-key", trim = true } }
params = [
  { name = "q", type = "string", required = true, description = "Search keyword", example = "httpx" },
  { name = "limit", type = "number", description = "Result limit", example = 10 }
]
extract_type = "jq"
extract_expr = ".body.items | map({id, name})"

[actions.summary]
description = "Build a filtered summary from the search result"
path = "/search"
query = { q = { from = "param", key = "q" }, api_key = { from = "file", path = "~/.local/secret/httpx/demo-api-key", trim = true } }
params = [
  { name = "q", type = "string", required = true, description = "Search keyword", example = "httpx" }
]
extracts = [
  { name = "days", type = "number", description = "Keep items from the last N days", example = 7 },
  { name = "owner", type = "string|string[]", description = "Exact owner filter", example = "infra" }
]
extract_type = "jq"
extract_expr = '''
def as_list($value):
  if $value == null then []
  elif ($value | type) == "array" then $value
  else [$value]
  end;
.extract as $extract
| [
    .body.items[]
    | (.owner // "" | tostring) as $owner
    | select(
        (($extract.days // null) == null or (.age_days <= ($extract.days | tonumber)))
        and (
          ($extract.owner // null) == null
          or (as_list($extract.owner) | map(tostring) | index($owner)) != null
        )
      )
  ]
| {total: length}
'''

[actions.repo]
description = "Fetch repository information using a shell-sourced token"
path = "/repo"
headers = { Authorization = { from = "shell", cmd = "pass demo/token", trim = true } }
extract_type = "regex"
extract_pattern = "token=([A-Za-z0-9_-]+)"
extract_group = 1
